name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - release/**
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build_and_test:
    name: Build + Unit Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # If you have a global.json, setup-dotnet will respect it automatically.
          # Otherwise this ensures a modern SDK is available.
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.fsproj
            **/*.props
            **/*.targets
            **/packages.lock.json

      - name: Restore
        run: dotnet restore ./pdf-downloader.slnx

      - name: Build (Release)
        run: dotnet build ./pdf-downloader.slnx -c Release --no-restore

      - name: Test (Release)
        run: >
          dotnet test ./pdf-downloader.Test/pdf-downloader.Test.csproj
          -c Release
          --no-build
          --logger GitHubActions
          --blame-crash
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Upload test results & coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: |
            **/TestResults/**
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: pdf-downloader.Api/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./storage:/app/storage

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdf-downloader
    ports:
      - "5432:5432"
